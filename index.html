<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Maya Slot Spins</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(135deg,#1a0f0a,#2d1810,#0d0705);font-family:Georgia,serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#d4a574}
.gc{width:min(95vw,500px);background:linear-gradient(180deg,#3d2b1f,#2a1a0f);border:6px solid #8b7355;border-radius:12px;padding:15px;box-shadow:0 0 40px rgba(0,0,0,.8)}.title{text-align:center;font-size:clamp(1.2em,4vw,1.8em);color:#ffd700;text-shadow:2px 2px 4px #000;margin-bottom:10px}
.rw{display:flex;justify-content:center;gap:8px;margin:15px 0;padding:15px;border-radius:8px;border:3px solid #5c4a3a;position:relative}.rw::after{content:'';position:absolute;top:50%;left:0;right:0;height:70px;transform:translateY(-50%);border:2px solid #ffd700;border-radius:6px;pointer-events:none;z-index:10;box-shadow:0 0 12px rgba(255,215,0,.4)}
.reel{width:clamp(80px,25vw,110px);height:240px;clip-path:inset(0 round 8px);perspective:800px;background:linear-gradient(180deg,#4a3628,#3d2b1f);border:3px solid #8b7355;border-radius:8px;position:relative}
.reel::before,.reel::after{content:'';position:absolute;left:0;right:0;height:40px;z-index:5;pointer-events:none}.reel::before{top:0;background:linear-gradient(180deg,rgba(26,15,10,.8),transparent)}.reel::after{bottom:0;background:linear-gradient(0deg,rgba(26,15,10,.8),transparent)}
.ri{transform-style:preserve-3d;width:100%;height:100%;position:relative}.sym{position:absolute;width:100%;height:68px;top:50%;margin-top:-34px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#6b5744,#5c4a3a,#4a3628);border:2px solid #8b7355;border-radius:6px;font-size:clamp(.8em,2.2vw,1em);text-shadow:1px 1px 3px #000;backface-visibility:hidden;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;padding:2px 4px;line-height:1.2}
.sym.a{background:linear-gradient(135deg,#8b6914,#a08060);animation:gl 1.5s infinite alternate}.sym.win{box-shadow:0 0 15px #ffd700,inset 0 0 10px rgba(255,215,0,.3);border-color:#ffd700}@keyframes gl{to{box-shadow:0 0 20px #ffd700}}
.ctrls{display:flex;justify-content:center;gap:8px;margin:12px 0;flex-wrap:wrap}button{background:linear-gradient(180deg,#8b7355,#5c4a3a);color:#f4e4c1;border:2px solid #d4a574;padding:8px 18px;font-size:clamp(.9em,3vw,1.1em);cursor:pointer;border-radius:6px;font-family:Georgia,serif;transition:all .2s;text-shadow:1px 1px 2px #000}
button:hover{background:linear-gradient(180deg,#a08060,#6b5744)}button:active{transform:scale(.95)}button:disabled{opacity:.5;cursor:not-allowed}.ib{display:flex;justify-content:space-between;background:#1a0f0a;padding:10px;border-radius:6px;border:2px solid #5c4a3a;font-size:clamp(.8em,2.5vw,1em)}.ib span{display:flex;flex-direction:column;align-items:center;gap:2px}.ib b{color:#ffd700;font-size:1.2em}
.bo{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;justify-content:center;align-items:center;flex-direction:column;z-index:100}.bo.on{display:flex}.bo h2{color:#ffd700;font-size:clamp(1.5em,5vw,2.5em);text-shadow:0 0 20px #ff8c00;margin-bottom:15px;animation:gl 1s infinite alternate}.doors{display:flex;gap:15px;flex-wrap:wrap;justify-content:center}
.door{width:clamp(70px,20vw,100px);height:clamp(100px,30vw,140px);background:linear-gradient(180deg,#5c4a3a,#3d2b1f);border:3px solid #d4a574;border-radius:8px;cursor:pointer;font-size:2.5em;display:flex;align-items:center;justify-content:center;transition:all .3s;color:#d4a574}.door:hover{transform:scale(1.08);box-shadow:0 0 25px rgba(255,215,0,.6)}.door.rv{cursor:default;font-size:1.5em;font-weight:bold}
.wm{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(42,26,15,.95);border:4px solid #ffd700;border-radius:12px;padding:20px 40px;text-align:center;z-index:50;display:none}.wm.on{display:block;animation:pop .3s ease}@keyframes pop{from{transform:translate(-50%,-50%) scale(.5);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}.wm h3{color:#ffd700;font-size:1.5em}.wm p{color:#d4a574}
</style></head><body>
<div class="gc"><h1 class="title">&#9788; MAYA SLOT SPINS &#9788;</h1><div class="rw" id="rw"></div><div class="ctrls"><button onclick="betCh(-5)">-BET</button><button onclick="spin()" id="sb">&#9788; SPIN</button><button onclick="betCh(5)">+BET</button></div><div class="ib"><span>CREDITS<b id="cr">1000</b></span><span>BET<b id="bt">10</b></span><span>WIN<b id="wn">0</b></span></div></div>
<div class="bo" id="bo"><h2>&#9788; SUN GOD BONUS &#9788;</h2><p style="color:#d4a574">Choose a temple doorway!</p><div class="doors" id="drs"></div><p id="br" style="color:#ffd700;font-size:1.3em;margin-top:20px"></p></div>
<div class="wm" id="wm"><h3 id="wt"></h3><p id="wtx"></p></div>
<script>
const S=[{s:'🐊',n:'Imix',v:5},{s:'💨',n:"Ik'",v:8},{s:'🌑',n:"Ak'bal",v:10},{s:'🌽',n:"K'an",v:15},{s:'🐍',n:"Chik'chan",v:20},{s:'💀',n:'Kimi',v:25},{s:'🦌',n:"Manik'",v:30},{s:'🐇',n:'Lamat',v:40},{s:'🌧',n:'Muluk',v:50},{s:'🐕',n:'Ok',v:60},{s:'🐒',n:'Chuwen',v:70},{s:'🧹',n:'Eb',v:80},{s:'🎋',n:'Ben',v:90},{s:'🐆',n:'Ix',v:100},{s:'🦅',n:'Men',v:120},{s:'🦃',n:'Kib',v:150},{s:'🌋',n:'Kaban',v:200},{s:'🔪',n:"Etz'nab",v:250},{s:'⛈',n:'Kawak',v:500},{s:'☀',n:'Ahau',v:1000}];
const N=20,SH=68,ANG=360/N,R=(SH/2)/Math.tan(Math.PI/N);
let cr=1000,bt=10,sp=false,ib=false;const ac=new(window.AudioContext||window.webkitAudioContext)();
function snd(f,d,t='sine',v=.12){const o=ac.createOscillator(),g=ac.createGain();o.type=t;o.frequency.setValueAtTime(f,ac.currentTime);g.gain.setValueAtTime(v,ac.currentTime);g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);o.connect(g);g.connect(ac.destination);o.start();o.stop(ac.currentTime+d)}
function stone(){snd(80+Math.random()*40,.06,'sawtooth',.06)}function rStop(){snd(60,.2,'square',.1);snd(45,.12,'sine',.08)}function winS(){snd(523,.3);setTimeout(()=>snd(659,.3),120);setTimeout(()=>snd(784,.4),240)}function bonusS(){for(let i=0;i<5;i++)setTimeout(()=>snd(440+i*110,.3),i*120)}
function build(){const w=document.getElementById('rw');w.innerHTML='';for(let i=0;i<3;i++){const r=document.createElement('div');r.className='reel';r.id='r'+i;const n=document.createElement('div');n.className='ri';for(let j=0;j<N;j++){const s=S[j],e=document.createElement('div');e.className='sym'+(s.n==='Ahau'?' a':'');e.textContent=s.s+' '+s.n;e.style.transform=`rotateX(${j*ANG}deg) translateZ(${R}px)`;n.appendChild(e)}r.appendChild(n);w.appendChild(r)}}
function spin(){if(sp||cr<bt||ib)return;sp=true;cr-=bt;upd();document.getElementById('sb').disabled=true;document.getElementById('wm').classList.remove('on');clearWins();const f=[rnd(),rnd(),rnd()],re=[];for(let i=0;i<3;i++){const n=document.getElementById('r'+i).querySelector('.ri');n.style.transition='none';n.style.transform='rotateX(0deg)';n.offsetHeight;re.push({el:n,f:f[i]})}re.forEach((r,i)=>{setTimeout(()=>{r.el.style.transition=`transform ${1+i*.3}s cubic-bezier(.2,.8,.3,1)`;const cycles=10+i*5;r.el.style.transform=`rotateX(${-(cycles*360+r.f*ANG)}deg)`;for(let t=0;t<15+i*5;t++)setTimeout(stone,t*80);setTimeout(rStop,(1+i*.3)*1000);if(i===2)setTimeout(()=>res(re),Math.ceil(1.3)*1000+200)},i*200)})}
function res(re){const rs=re.map(r=>{const m=r.el.style.transform.match(/rotateX\((.+?)deg\)/);if(!m)return 0;return((Math.round(-parseFloat(m[1])/ANG)%N)+N)%N});const sy=rs.map(i=>S[i]),ah=sy.filter(s=>s.n==='Ahau').length;if(ah>=3){bon(ah);return}let w=0,wm=-1;if(sy[0].n===sy[1].n&&sy[1].n===sy[2].n){w=sy[0].v*bt/10;wm=0}else if(sy[0].n===sy[1].n){w=Math.floor(sy[0].v*bt/25);wm=0}else if(sy[1].n===sy[2].n){w=Math.floor(sy[1].v*bt/25);wm=1}else if(sy[0].n===sy[2].n){w=Math.floor(sy[0].v*bt/25);wm=0}
if(w>0){cr+=w;winS();highlightWins(rs,wm);showW(sy,w)}sp=false;document.getElementById('sb').disabled=false;upd()}
function highlightWins(rs,wm){if(wm===-1)return;const matches=rs[0]===rs[1]&&rs[1]===rs[2]?[0,1,2]:wm===0&&rs[0]===rs[1]?[0,1]:wm===1&&rs[1]===rs[2]?[1,2]:[0,2];matches.forEach(i=>{const reel=document.getElementById('r'+i).querySelector('.ri'),sym=reel.children[rs[i]];if(sym)sym.classList.add('win')})}
function clearWins(){for(let i=0;i<3;i++){const reel=document.getElementById('r'+i).querySelector('.ri');Array.from(reel.children).forEach(c=>c.classList.remove('win'))}}
function bon(c){ib=true;bonusS();document.getElementById('bo').classList.add('on');document.getElementById('br').textContent=c+' Sun Gods bless you!';const d=document.getElementById('drs');d.innerHTML='';const ml=[2,3,5,8,10,15].sort(()=>Math.random()-.5).slice(0,4);for(let i=0;i<4;i++){const dr=document.createElement('div');dr.className='door';dr.textContent='🏛';dr.onclick=()=>{if(dr.classList.contains('rv'))return;dr.classList.add('rv');dr.style.background='linear-gradient(135deg,#ffd700,#ff8c00)';dr.textContent=ml[i]+'×';const p=Math.floor(bt*ml[i]*c);cr+=p;upd();document.getElementById('br').textContent='+'+p+' Credits!';bonusS();setTimeout(()=>{document.getElementById('bo').classList.remove('on');ib=false;sp=false;document.getElementById('sb').disabled=false},2200)};d.appendChild(dr)}}
function showW(sy,w){const m=document.getElementById('wm');document.getElementById('wt').textContent=w>=bt*5?'MEGA WIN!':w>=bt*2?'BIG WIN!':'WIN!';const matchSy=sy[0].n===sy[1].n?sy[0]:sy[2];document.getElementById('wtx').textContent=w+' Credits — '+matchSy.s+' '+matchSy.n;m.classList.add('on');setTimeout(()=>m.classList.remove('on'),2500)}
function betCh(d){if(sp)return;bt=Math.max(5,Math.min(100,bt+d));upd()}function rnd(){return Math.floor(Math.random()*N)}function upd(){document.getElementById('cr').textContent=cr;document.getElementById('bt').textContent=bt}
build();</script></body></html>
